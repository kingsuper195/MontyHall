<!DOCTYPE html>
<html>

<head>
    <title>Monty Hall Problem Simulator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h1>Monty Hall Problem Simulator Round <span id="roundnumber"></span></h1>
    <div id="prompt"></div>
    <div id="doors">
        <div id="door1" class="door">
            <div class="number">1</div>
            <div class="handle"></div>
        </div>
        <div id="door2" class="door">
            <div class="number">2</div>
            <div class="handle"></div>
        </div>
        <div id="door3" class="door">
            <div class="number">3</div>
            <div class="handle"></div>
        </div>
    </div>
    <table id="results">
        <tbody>
            <tr>
                <th>Got?</th>
                <th>Switched?</th>
            </tr>
        </tbody>

    </table>
    <script src="index.js"></script>
</body>

</html>
